name: Group and Combine Base and Add-on Data

on:
  push:
    paths:
      - 'data/base/*.json'
      - 'data/add-on/*.json'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  combine-json:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Process Folders Script
        run: |
          node -e "
          const fs = require('fs');
          const path = require('path');

          const foldersToProcess = ['base', 'add-on'];
          const distDir = path.join(process.cwd(), 'dist');

          // Ensure dist folder exists
          if (!fs.existsSync(distDir)) {
            fs.mkdirSync(distDir, { recursive: true });
          }

          foldersToProcess.forEach(folder => {
            const sourcePath = path.join(process.cwd(), 'data', folder);
            if (!fs.existsSync(sourcePath)) {
              console.log('Skipping non-existent path: ' + sourcePath);
              return;
            }

            const combinedArray = [];
            const files = fs.readdirSync(sourcePath).filter(f => f.endsWith('.json'));

            files.forEach(file => {
              try {
                const filePath = path.join(sourcePath, file);
                const data = JSON.parse(fs.readFileSync(filePath, 'utf8'));

                // Push the exact object data unmodified
                combinedArray.push(data);
              } catch (e) {
                console.error('Error processing ' + folder + '/' + file + ':', e.message);
              }
            });

            // Write the array directly to dist/base.json or dist/add-on.json
            const outputPath = path.join(distDir, folder + '.json');
            fs.writeFileSync(outputPath, JSON.stringify(combinedArray, null, 2));
            console.log('Successfully created: dist/' + folder + '.json (' + combinedArray.length + ' items)');
          });
          "

      - name: Commit and Push changes
        run: |
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'
          git add dist/
          if git diff --quiet && git diff --staged --quiet; then
            echo "No changes to commit"
          else
            git commit -m "chore: update base and add-on database bundles [skip ci]"
            git pull --rebase origin main
            git push origin main
          fi
