name: Combine All Countries Into Single JSON

on:
  push:
    paths:
      - 'data/*.json'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  combine-json:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Combine Files Script
        run: |
          node -e "
          const fs = require('fs');
          const path = require('path');

          const dataDir = path.join(process.cwd(), 'data');
          const distDir = path.join(process.cwd(), 'dist');

          // Ensure dist folder exists
          if (!fs.existsSync(distDir)) {
            fs.mkdirSync(distDir, { recursive: true });
          }

          if (!fs.existsSync(dataDir)) {
            console.error('Error: data folder does not exist!');
            process.exit(1);
          }

          const combinedArray = [];
          const files = fs.readdirSync(dataDir).filter(f => f.endsWith('.json'));

          files.forEach(file => {
            try {
              const filePath = path.join(dataDir, file);
              const fileData = JSON.parse(fs.readFileSync(filePath, 'utf8'));
          
              // Push the country object directly into our global array
              combinedArray.push(fileData);
              console.log('Added ' + file + ' to combined dataset.');
            } catch (e) {
              console.error('Error reading ' + file + ':', e.message);
            }
          });

          // Write the entire array into a single target file
          const outputPath = path.join(distDir, 'all-countries.json');
          fs.writeFileSync(outputPath, JSON.stringify(combinedArray, null, 2));
          console.log('Successfully created combined file at: dist/all-countries.json');
          "

      - name: Commit and Push changes
        run: |
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'
          git add dist/
          if git diff --quiet && git diff --staged --quiet; then
            echo "No changes to commit"
          else
            git commit -m "chore: combine country data into a single file [skip ci]"
            git pull --rebase origin main
            git push origin main
          fi
